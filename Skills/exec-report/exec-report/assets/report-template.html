<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{REPORT_TITLE}}</title>
<style>
/*
  DESIGN TOKENS
  Palette is applied via a class on <body> (e.g. body.palette-warm-paper).
  Base (:root) holds shape, type scale, and fallback values.
  See references/design-system.md for all four palette definitions.
*/
:root{
  /* Palette defaults: warm-paper */
  --bg:          #faf7f2;
  --surface:     #ffffff;
  --ink:         #1a1814;
  --ink-muted:   #7a7268;
  --accent:      #c8553d;
  --accent-soft: #f9e6e2;
  --negative:    #b91c1c;
  --border:      #e8e2d8;
  --grid:        #f0ece4;

  /* Shape */
  --radius:    16px;
  --radius-sm: 10px;
  --pad:       28px;
  --gap:       20px;

  /* Type */
  --font-display: ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-body:    ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-mono:    ui-monospace,"SF Mono",Menlo,monospace;

  --fs-hero:  clamp(28px, 4.2vw, 52px);
  --fs-kpi:   clamp(42px, 5.8vw, 72px);
  --fs-h2:    18px;
  --fs-body:  15px;
  --fs-small: 13px;
  --fs-tiny:  11px;
}

/* ── PALETTES ──────────────────────────────────── */
body.palette-deep-ink{
  --bg:#0f0e0c; --surface:#1a1916; --ink:#f2efe8; --ink-muted:#8a857a;
  --accent:#d4a574; --accent-soft:rgba(212,165,116,0.12);
  --negative:#f87171; --border:#2a2925; --grid:#211f1c;
}
body.palette-clean-white{
  --bg:#ffffff; --surface:#f9fafb; --ink:#0a0a0a; --ink-muted:#6b6b6b;
  --accent:#2d5a3d; --accent-soft:#edf7f1;
  --negative:#dc2626; --border:#e5e7eb; --grid:#f3f4f6;
}
body.palette-slate{
  --bg:#f1f5f9; --surface:#ffffff; --ink:#0f172a; --ink-muted:#64748b;
  --accent:#2563eb; --accent-soft:#eff6ff;
  --negative:#dc2626; --border:#e2e8f0; --grid:#f1f5f9;
}

/* ── RESET & BASE ──────────────────────────────── */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11","tnum";
}
.page{max-width:1240px;margin:0 auto;padding:48px 40px 80px}

/* ── HERO (header + editorial sentence) ────────── */
.rpt-header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding-bottom:20px;border-bottom:1px solid var(--border);
}
.rpt-header .company{font-weight:600;font-size:16px;letter-spacing:-0.01em}
.rpt-header .label{font-size:var(--fs-small);color:var(--ink-muted);letter-spacing:0.04em;text-transform:uppercase}

.hero{
  margin:56px 0 48px;
  font-family:var(--font-display);
  font-size:var(--fs-hero);
  font-weight:400;
  line-height:1.15;
  letter-spacing:-0.02em;
  max-width:22ch;
}
.hero .accent{color:var(--accent)}
.hero .num{font-feature-settings:"tnum";font-variant-numeric:tabular-nums}

/* ── KPI ROW ───────────────────────────────────── */
.kpis{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:var(--gap);margin-bottom:48px;
}
.kpi{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:var(--pad);
  display:flex;flex-direction:column;
}
.kpi .kpi-label{
  font-size:var(--fs-tiny);text-transform:uppercase;
  letter-spacing:0.08em;color:var(--ink-muted);margin-bottom:14px;
}
.kpi .kpi-value{
  font-family:var(--font-display);font-size:var(--fs-kpi);
  font-weight:300;line-height:1;letter-spacing:-0.03em;
  font-variant-numeric:tabular-nums;
}
.kpi .kpi-delta{
  margin-top:auto;padding-top:12px;font-size:var(--fs-small);
  display:inline-flex;align-items:center;gap:6px;
}
.kpi .kpi-delta.up{color:var(--accent)}
.kpi .kpi-delta.down{color:var(--negative)}

/* ── CARDS (shared shell for trend, bar-list, table, status) ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:var(--pad);
  margin-bottom:var(--gap);
}
.card h2{
  font-family:var(--font-display);font-size:var(--fs-h2);
  font-weight:500;letter-spacing:-0.01em;margin:0 0 4px 0;
}
.card .sub{font-size:var(--fs-small);color:var(--ink-muted);margin-bottom:24px}

/* ── TREND CHART ───────────────────────────────── */
.trend-card svg{display:block;width:100%;height:auto;overflow:visible}
.trend-line{
  fill:none;stroke:var(--accent);stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
}
.trend-prior{
  fill:none;stroke:var(--ink-muted);stroke-width:1;
  stroke-dasharray:3 4;opacity:0.45;
}
.trend-area{fill:var(--accent-soft);opacity:0.4}
.trend-grid{stroke:var(--grid);stroke-width:1}
.trend-axis-label{font-size:11px;fill:var(--ink-muted);font-family:var(--font-mono)}
.trend-dot{
  fill:var(--bg);stroke:var(--accent);stroke-width:2;
  r:5;opacity:0;transition:opacity .15s;
}
.trend-dot.active{opacity:1}
.trend-guideline{stroke:var(--ink-muted);stroke-width:1;opacity:0;stroke-dasharray:2 3}
.trend-guideline.active{opacity:0.5}
.trend-tooltip{
  position:absolute;pointer-events:none;
  background:var(--ink);color:var(--bg);
  font-size:var(--fs-small);padding:8px 12px;border-radius:8px;
  transform:translate(-50%,-130%);opacity:0;transition:opacity .15s;
  font-variant-numeric:tabular-nums;white-space:nowrap;z-index:10;
}
.trend-wrap{position:relative;-webkit-user-select:none;user-select:none}

/* ── BAR-LIST (segments) ───────────────────────── */
.seg-row{
  display:grid;grid-template-columns:140px 1fr auto;
  align-items:center;gap:16px;
  padding:14px 0;border-bottom:1px solid var(--border);
  transition:opacity .15s;
}
.seg-row:last-child{border-bottom:0}
.seg-row .seg-name{font-size:var(--fs-body);font-weight:500}
.seg-row .seg-track{height:8px;background:var(--grid);border-radius:999px;overflow:hidden}
.seg-row .seg-fill{
  height:100%;background:var(--accent);border-radius:999px;
  transform-origin:left;transform:scaleX(0);
  transition:transform .8s cubic-bezier(.2,.7,.2,1);
}
.seg-row .seg-amt{font-variant-numeric:tabular-nums;font-size:var(--fs-body);min-width:100px;text-align:right}
.seg-row .seg-pct{display:block;font-size:var(--fs-tiny);color:var(--ink-muted);margin-top:2px;text-align:right}
.segments:hover .seg-row:not(:hover){opacity:0.4}

/* ── COMPARE STRIP ─────────────────────────────── */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:var(--gap)}
.compare .cmp-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:var(--pad);
}
.compare h3{
  font-size:var(--fs-tiny);font-weight:500;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--ink-muted);margin:0 0 16px 0;
}
.cmp-rows{display:grid;gap:10px}
.cmp-row{
  display:grid;grid-template-columns:1fr auto auto auto;
  gap:12px;align-items:baseline;font-variant-numeric:tabular-nums;
  padding:4px 0;border-bottom:1px solid var(--grid);
}
.cmp-row:last-child{border-bottom:0}
.cmp-row .ck{font-size:var(--fs-small);color:var(--ink-muted)}
.cmp-row .ca{text-align:right;font-size:var(--fs-body)}
.cmp-row .cb{text-align:right;font-size:var(--fs-small);color:var(--ink-muted)}
.cmp-row .cd{text-align:right;font-size:var(--fs-small);min-width:48px}
.cmp-row .cd.up{color:var(--accent)}
.cmp-row .cd.down{color:var(--negative)}

/* ── HIGHLIGHTS ────────────────────────────────── */
.highlights{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:var(--gap);margin-bottom:var(--gap)}
.highlight{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;
}
.highlight .hl-tag{
  font-size:var(--fs-tiny);text-transform:uppercase;letter-spacing:0.08em;
  color:var(--accent);margin-bottom:10px;
}
.highlight .hl-body{font-size:var(--fs-body);line-height:1.5;color:var(--ink)}

/* ── TABLE ─────────────────────────────────────── */
.data-table-wrap{overflow-x:auto;margin-top:4px}
.data-table{width:100%;border-collapse:collapse}
.data-table th{
  font-size:var(--fs-tiny);text-transform:uppercase;letter-spacing:0.08em;
  color:var(--ink-muted);text-align:left;padding:0 8px 12px 0;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
.data-table td{
  padding:12px 8px 12px 0;font-size:var(--fs-small);
  border-bottom:1px solid var(--grid);vertical-align:middle;
  font-variant-numeric:tabular-nums;
}
.data-table tr:last-child td{border-bottom:0}
/* Inline badge: <span class="tbl-badge tbl-badge--green">On Track</span> */
.tbl-badge{
  display:inline-block;padding:2px 9px;border-radius:20px;
  font-size:var(--fs-tiny);font-weight:600;letter-spacing:0.03em;white-space:nowrap;
}
.tbl-badge--green{background:#d1fae5;color:#065f46}
.tbl-badge--amber{background:#fef3c7;color:#92400e}
.tbl-badge--red  {background:#fee2e2;color:#991b1b}
.tbl-badge--gray {background:#f1f5f9;color:#475569}
.tbl-badge--blue {background:#dbeafe;color:#1e40af}

/* ── STATUS GRID ───────────────────────────────── */
.status-list{display:grid;gap:0}
.status-row{
  display:grid;grid-template-columns:12px 1fr auto;
  align-items:center;gap:14px;
  padding:13px 0;border-bottom:1px solid var(--grid);
}
.status-row:last-child{border-bottom:0}
.status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  margin:0 2px;
}
.status-dot--green{background:#059669}
.status-dot--amber{background:#d97706}
.status-dot--red  {background:#dc2626}
.status-dot--gray {background:#94a3b8}
.status-dot--blue {background:#0284c7}
.status-name{font-size:var(--fs-body)}
.status-val {font-size:var(--fs-small);color:var(--ink-muted);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}

/* ── FOOTER ────────────────────────────────────── */
.rpt-footer{
  margin-top:48px;padding-top:20px;border-top:1px solid var(--border);
  font-size:var(--fs-tiny);color:var(--ink-muted);
  display:flex;justify-content:space-between;gap:16px;
}

/* ── MOTION ────────────────────────────────────── */
.kpi .kpi-value,.hero .num{opacity:0;animation:rise .7s .1s both}
.kpi:nth-child(2) .kpi-value{animation-delay:.18s}
.kpi:nth-child(3) .kpi-value{animation-delay:.26s}
.kpi:nth-child(4) .kpi-value{animation-delay:.34s}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.trend-line{stroke-dasharray:2000;stroke-dashoffset:2000;animation:draw 1.2s .3s forwards ease-out}
@keyframes draw{to{stroke-dashoffset:0}}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  .seg-row .seg-fill{transform:scaleX(1)}
  .trend-line{stroke-dashoffset:0}
}

/* ── RESPONSIVE ────────────────────────────────── */
@media(max-width:820px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .compare{grid-template-columns:1fr}
  .page{padding:32px 20px 60px}
  .hero{margin:36px 0 32px}
  .seg-row{grid-template-columns:100px 1fr auto}
}

/* ── PRINT ─────────────────────────────────────── */
@media print{
  :root{--bg:#fff;--surface:#fff;--ink:#000;--ink-muted:#555;--border:#ddd;--grid:#eee;--accent-soft:#f5f5f5}
  body{font-size:11pt}
  .page{max-width:none;padding:0.5in}
  .card,.kpi,.cmp-block,.highlight{break-inside:avoid}
  .trend-line{stroke-dashoffset:0}
  .seg-row .seg-fill{transform:scaleX(1)}
  *{animation:none !important;transition:none !important}
}

/* ── FOCUS ─────────────────────────────────────── */
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
</style>
</head>
<body class="{{PALETTE_CLASS}}">
<main class="page">

{{HERO}}

{{BLOCKS}}

<div class="rpt-footer">
  <div>{{FOOTER_L}}</div>
  <div>{{FOOTER_R}}</div>
</div>

</main>

</body>
</html>
