<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{REPORT_TITLE}}</title>
<style>
/*
  DESIGN TOKENS
  Palette is applied via a class on <body> (e.g. body.palette-slate).
  Base (:root) holds shape, type scale, and fallback values.
  See references/design-system.md for all four palette definitions.
*/
:root{
  /* Palette defaults: slate */
  --bg:          #f1f5f9;
  --surface:     #ffffff;
  --ink:         #0f172a;
  --ink-muted:   #64748b;
  --accent:      #2563eb;
  --accent-soft: #eff6ff;
  --negative:    #dc2626;
  --border:      #e2e8f0;
  --grid:        #f1f5f9;

  /* Shape */
  --radius:        16px;
  --radius-sm:     10px;
  --pad:           28px;
  --gap:           20px;
  --label-col-w:   120px;
  --track-h:       48px;
  --block-h:       32px;

  /* Type */
  --font-display: ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-body:    ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-mono:    ui-monospace,"SF Mono",Menlo,monospace;

  --fs-h2:    18px;
  --fs-body:  15px;
  --fs-small: 13px;
  --fs-tiny:  11px;
}

/* ── PALETTES ──────────────────────────────────── */
body.palette-warm-paper{
  --bg:#faf7f2; --surface:#ffffff; --ink:#1a1814; --ink-muted:#7a7268;
  --accent:#c8553d; --accent-soft:#f9e6e2;
  --negative:#b91c1c; --border:#e8e2d8; --grid:#f0ece4;
}
body.palette-deep-ink{
  --bg:#0f0e0c; --surface:#1a1916; --ink:#f2efe8; --ink-muted:#8a857a;
  --accent:#d4a574; --accent-soft:rgba(212,165,116,0.12);
  --negative:#f87171; --border:#2a2925; --grid:#211f1c;
}
body.palette-clean-white{
  --bg:#ffffff; --surface:#f9fafb; --ink:#0a0a0a; --ink-muted:#6b6b6b;
  --accent:#2d5a3d; --accent-soft:#edf7f1;
  --negative:#dc2626; --border:#e5e7eb; --grid:#f3f4f6;
}

/* ── RESET & BASE ──────────────────────────────── */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11","tnum";
}
.page{max-width:1240px;margin:0 auto;padding:48px 40px 80px}

/* ── REPORT HEADER ─────────────────────────────── */
.rpt-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:24px;
  padding-bottom:20px;border-bottom:1px solid var(--border);
  margin-bottom:32px;
}
.rpt-header-left{display:flex;flex-direction:column;gap:4px}
.rpt-title{font-weight:600;font-size:16px;letter-spacing:-0.01em}
.rpt-subtitle{font-size:var(--fs-small);color:var(--ink-muted)}
.rpt-date-range{
  font-size:var(--fs-small);color:var(--ink-muted);
  white-space:nowrap;padding-top:2px;
  font-variant-numeric:tabular-nums;
}

/* ── ROADMAP WRAPPER ───────────────────────────── */
.roadmap-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}

/* ── RULER ─────────────────────────────────────── */
.roadmap-ruler{
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.ruler-label-col{
  flex:0 0 var(--label-col-w);
  min-width:var(--label-col-w);
  border-right:1px solid var(--border);
}
.ruler-track{
  flex:1;
  position:relative;
  height:28px;
  overflow:hidden;
}
.ruler-month{
  position:absolute;
  top:0;bottom:0;
  display:flex;align-items:center;
  padding-left:8px;
  font-family:var(--font-mono);
  font-size:var(--fs-tiny);
  color:var(--ink-muted);
  border-right:1px solid var(--border);
  white-space:nowrap;overflow:hidden;
}
.today-label{
  position:absolute;
  top:4px;
  transform:translateX(-50%);
  background:var(--accent);
  color:#fff;
  font-size:9px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:20px;
  white-space:nowrap;
  pointer-events:none;
  z-index:10;
}

/* ── SWIMLANE ROWS ─────────────────────────────── */
.swimlane{
  display:flex;
  border-bottom:1px solid var(--border);
  min-height:var(--track-h);
  position:relative;
}
.swimlane:last-child{border-bottom:0}
.swimlane-label{
  flex:0 0 var(--label-col-w);
  min-width:var(--label-col-w);
  padding:0 12px;
  display:flex;align-items:center;
  font-size:var(--fs-small);
  font-weight:500;
  color:var(--ink-muted);
  border-right:1px solid var(--border);
  background:var(--bg);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.swimlane-track{
  flex:1;
  position:relative;
  background:var(--surface);
  height:var(--track-h);
}

/* ── PHASE BLOCKS ──────────────────────────────── */
.phase-block{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  height:var(--block-h);
  border-radius:6px;
  display:flex;align-items:center;
  padding:0 10px;
  cursor:default;
  overflow:hidden;
  transition:filter .15s,opacity .15s;
  min-width:2px;
}
.phase-block:hover{filter:brightness(1.08)}
.phase-label{
  font-size:var(--fs-tiny);
  font-weight:500;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  pointer-events:none;
}
.phase-dep{
  font-size:9px;
  color:rgba(255,255,255,0.7);
  margin-left:6px;
  white-space:nowrap;
  flex-shrink:0;
}

/* Status variants — phase blocks */
.phase-block.status-on-track {background:var(--accent);opacity:0.88}
.phase-block.status-at-risk  {background:#d97706;opacity:0.88}
.phase-block.status-delayed  {background:var(--negative);opacity:0.88}
.phase-block.status-complete {background:#059669;opacity:0.88}
.phase-block.status-planned  {
  background:var(--accent-soft);
  border:1px dashed var(--border);
  opacity:1;
}
.phase-block.status-planned .phase-label{color:var(--ink-muted)}

/* ── MILESTONE DIAMONDS ────────────────────────── */
.milestone-diamond{
  position:absolute;
  top:50%;
  transform:translateX(-50%) translateY(-50%) rotate(45deg);
  width:14px;height:14px;
  border-radius:2px;
  cursor:default;
  transition:transform .15s;
  z-index:5;
}
.milestone-diamond:hover{
  transform:translateX(-50%) translateY(-50%) rotate(45deg) scale(1.25);
}
.milestone-diamond.status-on-track{background:var(--accent)}
.milestone-diamond.status-at-risk  {background:#d97706}
.milestone-diamond.status-delayed  {background:var(--negative)}
.milestone-diamond.status-complete {background:#059669}
.milestone-diamond.status-planned  {background:var(--ink-muted)}

/* ── TODAY LINE ────────────────────────────────── */
.today-line-bar{
  position:absolute;
  top:0;bottom:0;
  width:2px;
  background:var(--accent);
  opacity:0.7;
  pointer-events:none;
  z-index:8;
}

/* ── TOOLTIP ───────────────────────────────────── */
.rdm-tooltip{
  position:fixed;
  pointer-events:none;
  background:var(--ink);
  color:var(--bg);
  font-size:var(--fs-small);
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transition:opacity .15s;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  z-index:200;
  max-width:280px;
  white-space:normal;
  line-height:1.45;
}
.rdm-tooltip .tt-title{font-weight:600;margin-bottom:4px}
.rdm-tooltip .tt-dates{font-size:var(--fs-tiny);color:rgba(255,255,255,0.65);margin-bottom:2px}
.rdm-tooltip .tt-owner{font-size:var(--fs-tiny);color:rgba(255,255,255,0.65)}
.rdm-tooltip .tt-status{
  display:inline-block;margin-top:6px;
  font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.15);color:#fff;
}

/* ── MILESTONES WRAP ───────────────────────────── */
.milestones-wrap{
  display:flex;flex-direction:column;gap:0;
}
.ms-group-heading{
  font-size:var(--fs-tiny);
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-muted);
  margin:28px 0 8px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.ms-group-heading:first-child{margin-top:0}

.ms-card{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:16px;
  padding:16px 0;
  border-bottom:1px solid var(--grid);
  align-items:start;
}
.ms-card:last-child{border-bottom:0}

.ms-date-badge{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 10px;
  text-align:center;
  font-size:var(--fs-small);
  font-weight:500;
  font-variant-numeric:tabular-nums;
  line-height:1.3;
  color:var(--ink);
}

.ms-body{display:flex;flex-direction:column;gap:4px}
.ms-header-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.ms-status-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.status-dot--green{background:#059669}
.status-dot--amber{background:#d97706}
.status-dot--red  {background:#dc2626}
.status-dot--gray {background:#94a3b8}
.status-dot--blue {background:#0284c7}

.ms-title{font-weight:500;font-size:var(--fs-body)}
.ms-title.complete{text-decoration:line-through;opacity:0.6}
.ms-owner{
  margin-left:auto;
  font-size:var(--fs-tiny);
  color:var(--ink-muted);
  white-space:nowrap;
}
.ms-desc{font-size:var(--fs-small);color:var(--ink-muted);line-height:1.5;margin-top:2px}

/* ── FOOTER ────────────────────────────────────── */
.rpt-footer{
  margin-top:48px;padding-top:20px;
  border-top:1px solid var(--border);
  font-size:var(--fs-tiny);color:var(--ink-muted);
  display:flex;justify-content:space-between;gap:16px;
}

/* ── MOTION ────────────────────────────────────── */
.phase-block{opacity:0;animation:block-in .4s forwards ease-out}
.swimlane:nth-child(1) .phase-block{animation-delay:.05s}
.swimlane:nth-child(2) .phase-block{animation-delay:.10s}
.swimlane:nth-child(3) .phase-block{animation-delay:.15s}
.swimlane:nth-child(4) .phase-block{animation-delay:.20s}
.swimlane:nth-child(5) .phase-block{animation-delay:.25s}
.swimlane:nth-child(6) .phase-block{animation-delay:.30s}
@keyframes block-in{
  from{opacity:0;transform:translateY(-50%) translateY(4px)}
  to{opacity:0.88;transform:translateY(-50%)}
}
.phase-block.status-planned{animation-name:block-in-planned}
@keyframes block-in-planned{
  from{opacity:0;transform:translateY(-50%) translateY(4px)}
  to{opacity:1;transform:translateY(-50%)}
}
.today-line-bar{opacity:0;animation:fade-in .4s .4s forwards}
.ms-card{opacity:0;animation:card-in .35s forwards ease-out}
.ms-card:nth-child(1){animation-delay:.05s}
.ms-card:nth-child(2){animation-delay:.10s}
.ms-card:nth-child(3){animation-delay:.15s}
.ms-card:nth-child(4){animation-delay:.20s}
.ms-card:nth-child(5){animation-delay:.25s}
.ms-card:nth-child(6){animation-delay:.30s}
.ms-card:nth-child(7){animation-delay:.35s}
.ms-card:nth-child(8){animation-delay:.40s}
.ms-card:nth-child(n+9){animation-delay:.45s}
@keyframes card-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fade-in{from{opacity:0}to{opacity:0.7}}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  .phase-block{opacity:0.88}
  .phase-block.status-planned{opacity:1}
  .today-line-bar{opacity:0.7}
  .ms-card{opacity:1}
}

/* ── RESPONSIVE ────────────────────────────────── */
@media(max-width:720px){
  .page{padding:24px 16px 60px}
  :root{--label-col-w:80px}
  .rpt-date-range{display:none}
  .ms-card{grid-template-columns:60px 1fr;gap:10px}
}

/* ── PRINT ─────────────────────────────────────── */
@media print{
  :root{
    --bg:#fff;--surface:#fff;--ink:#000;--ink-muted:#555;
    --border:#ddd;--grid:#eee;--accent-soft:#f5f5f5;
  }
  body{font-size:11pt}
  .page{max-width:none;padding:0.5in}
  .roadmap-wrap{break-inside:avoid}
  .ms-card{break-inside:avoid}
  .phase-block{opacity:1 !important}
  .today-line-bar{opacity:0.7 !important}
  .ms-card{opacity:1 !important}
  *{animation:none !important;transition:none !important}
}

/* ── FOCUS ─────────────────────────────────────── */
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
</style>
</head>
<body class="{{PALETTE_CLASS}}">
<main class="page">

{{HEADER}}

{{CONTENT}}

<div class="rpt-footer">
  <div>{{FOOTER}}</div>
</div>

</main>
<div class="rdm-tooltip" id="rdm-tooltip"></div>

</body>
</html>
