<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{REPORT_TITLE}}</title>
<style>
/*
  DESIGN TOKENS
  Palette is applied via a class on <body> (e.g. body.palette-warm-paper).
  Base (:root) holds shape, type scale, and fallback values.
  See references/design-system.md for all four palette definitions.
*/
:root{
  /* Palette defaults: warm-paper */
  --bg:          #faf7f2;
  --surface:     #ffffff;
  --ink:         #1a1814;
  --ink-muted:   #7a7268;
  --accent:      #c8553d;
  --accent-soft: #f9e6e2;
  --negative:    #b91c1c;
  --border:      #e8e2d8;
  --grid:        #f0ece4;

  /* Shape */
  --radius:    16px;
  --radius-sm: 10px;
  --pad:       28px;
  --gap:       20px;

  /* Type */
  --font-display: ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-body:    ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-mono:    ui-monospace,"SF Mono",Menlo,monospace;

  --fs-hero:  clamp(28px, 4.2vw, 52px);
  --fs-h2:    18px;
  --fs-body:  15px;
  --fs-small: 13px;
  --fs-tiny:  11px;
}

/* ── PALETTES ──────────────────────────────────── */
body.palette-deep-ink{
  --bg:#0f0e0c; --surface:#1a1916; --ink:#f2efe8; --ink-muted:#8a857a;
  --accent:#d4a574; --accent-soft:rgba(212,165,116,0.12);
  --negative:#f87171; --border:#2a2925; --grid:#211f1c;
}
body.palette-clean-white{
  --bg:#ffffff; --surface:#f9fafb; --ink:#0a0a0a; --ink-muted:#6b6b6b;
  --accent:#2d5a3d; --accent-soft:#edf7f1;
  --negative:#dc2626; --border:#e5e7eb; --grid:#f3f4f6;
}
body.palette-slate{
  --bg:#f1f5f9; --surface:#ffffff; --ink:#0f172a; --ink-muted:#64748b;
  --accent:#2563eb; --accent-soft:#eff6ff;
  --negative:#dc2626; --border:#e2e8f0; --grid:#f1f5f9;
}

/* ── RESET & BASE ──────────────────────────────── */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11","tnum";
}
.page{max-width:1240px;margin:0 auto;padding:48px 40px 80px}

/* ── PAGE HEADER ───────────────────────────────── */
.rpt-header{
  display:flex;align-items:baseline;justify-content:space-between;gap:16px;
  padding-bottom:20px;border-bottom:1px solid var(--border);
  margin-bottom:40px;
}
.rpt-title{font-weight:600;font-size:16px;letter-spacing:-0.01em}
.rpt-subtitle{font-size:var(--fs-small);color:var(--ink-muted);letter-spacing:0.04em}

/* ── SHARED CARD SHELL ─────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:var(--pad);
}
.card h2{
  font-family:var(--font-display);font-size:var(--fs-h2);
  font-weight:500;letter-spacing:-0.01em;margin:0 0 16px 0;color:var(--ink);
}

/* ── STATUS DOTS ───────────────────────────────── */
.status-dot{
  display:inline-block;width:8px;height:8px;
  border-radius:50%;flex-shrink:0;
}
.status-dot--green{background:#059669}
.status-dot--amber{background:#d97706}
.status-dot--red  {background:#dc2626}
.status-dot--gray {background:#94a3b8}
.status-dot--blue {background:#0284c7}

/* ── CARD TYPE PILL ────────────────────────────── */
.card-type-pill{
  display:inline-block;padding:2px 9px;border-radius:20px;
  background:var(--grid);color:var(--ink-muted);
  font-size:var(--fs-tiny);font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;
}

/* ── TAG PILLS ─────────────────────────────────── */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.tag{
  display:inline-block;padding:3px 10px;border-radius:20px;
  background:var(--accent-soft);color:var(--accent);
  font-size:var(--fs-tiny);font-weight:600;
  letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;
}

/* ── KEY FACTS ─────────────────────────────────── */
.key-facts{
  display:grid;grid-template-columns:1fr 1fr;
  gap:0;margin:0 0 18px 0;padding:0;
  border-top:1px solid var(--grid);
}
.kf-row{
  display:contents;
}
.kf-row dt.kf-label,
.kf-row dd.kf-value{
  padding:7px 0;
  border-bottom:1px solid var(--grid);
  margin:0;
}
.kf-label{
  font-size:var(--fs-tiny);text-transform:uppercase;
  letter-spacing:0.08em;color:var(--ink-muted);
  font-weight:500;padding-right:12px;
}
.kf-value{
  font-size:14px;color:var(--ink);
  font-variant-numeric:tabular-nums;
  text-align:right;
}

/* ── GRID MODE ─────────────────────────────────── */
.dossier-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
  gap:var(--gap);
  align-items:start;
}

.dossier-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:var(--pad);
  display:flex;flex-direction:column;
  opacity:0;animation:fadeUp .5s forwards ease-out;
}
.dossier-card:nth-child(2){animation-delay:.07s}
.dossier-card:nth-child(3){animation-delay:.14s}
.dossier-card:nth-child(4){animation-delay:.21s}
.dossier-card:nth-child(5){animation-delay:.28s}
.dossier-card:nth-child(6){animation-delay:.35s}
.dossier-card:nth-child(7){animation-delay:.42s}
.dossier-card:nth-child(8){animation-delay:.49s}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:none}
}

/* Card header */
.card-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:12px;margin-bottom:16px;
}
.card-header-main{
  display:flex;flex-direction:column;gap:6px;
}
.card-name{
  font-size:20px;font-weight:600;letter-spacing:-0.02em;
  margin:0;color:var(--ink);line-height:1.2;
}

/* Card summary */
.card-summary{
  font-size:var(--fs-body);line-height:1.6;color:var(--ink);
  margin:0 0 18px 0;flex:1;
}

/* Card activity */
.card-activity{
  list-style:none;padding:0;margin:0;
  border-top:1px solid var(--grid);padding-top:14px;
}
.card-activity .activity-item{
  display:grid;grid-template-columns:auto 1fr;gap:10px;
  padding:6px 0;border-bottom:1px solid var(--grid);
  align-items:baseline;
}
.card-activity .activity-item:last-child{border-bottom:0;padding-bottom:0}
.card-activity .activity-date{
  font-family:var(--font-mono);font-size:var(--fs-tiny);
  color:var(--ink-muted);white-space:nowrap;padding-top:1px;
}
.card-activity .activity-text{
  font-size:var(--fs-small);color:var(--ink);line-height:1.45;
  min-width:0;overflow-wrap:break-word;
}

/* ── ONE-PAGER MODE ────────────────────────────── */
.op-hero{
  margin-bottom:32px;
  padding-bottom:28px;
  border-bottom:1px solid var(--border);
}
.op-hero-meta{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.op-name{
  font-family:var(--font-display);
  font-size:clamp(28px,4vw,48px);
  font-weight:600;letter-spacing:-0.02em;line-height:1.1;
  margin:0 0 10px 0;color:var(--ink);
}
.op-tagline{
  font-size:var(--fs-body);color:var(--ink-muted);
  margin:0;line-height:1.5;
}

/* Two-column layout */
.op-two-col{
  display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);
  margin-bottom:var(--gap);align-items:start;
}
.op-right-col{display:flex;flex-direction:column;gap:var(--gap)}

.op-facts-card .key-facts{margin-bottom:0}
.op-tags-card .tags{margin-bottom:0}

.op-quicktake-text{
  font-size:var(--fs-body);color:var(--accent);
  font-style:italic;line-height:1.55;margin:0;
}

/* Summary */
.op-summary-card{margin-bottom:var(--gap)}
.op-summary{
  font-size:var(--fs-body);line-height:1.65;color:var(--ink);margin:0;
}

/* Timeline */
.op-timeline-card{margin-bottom:var(--gap)}

.activity-list{
  position:relative;
  list-style:none;
  padding:0 0 0 28px;
  margin:0;
}
.activity-list::before{
  content:'';
  position:absolute;
  left:9px;top:8px;bottom:8px;
  width:2px;
  background:var(--border);
}
.activity-list .activity-item{
  position:relative;
  margin-bottom:20px;
}
.activity-list .activity-item:last-child{margin-bottom:0}
.activity-list .activity-item::before{
  content:'';
  position:absolute;
  left:-24px;top:6px;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--accent);
  border:2px solid var(--bg);
}
.activity-list .activity-date{
  font-family:var(--font-mono);
  font-size:var(--fs-tiny);
  color:var(--ink-muted);
  margin-bottom:2px;
  display:block;
}
.activity-list .activity-text{
  font-size:var(--fs-body);
  color:var(--ink);
  line-height:1.5;
}

/* ── FOOTER ────────────────────────────────────── */
.rpt-footer{
  margin-top:48px;padding-top:20px;border-top:1px solid var(--border);
  font-size:var(--fs-tiny);color:var(--ink-muted);
  display:flex;justify-content:space-between;gap:16px;
}

/* ── MOTION ────────────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  .dossier-card{opacity:1}
}

/* ── RESPONSIVE ────────────────────────────────── */
@media(max-width:820px){
  .page{padding:32px 20px 60px}
  .dossier-grid{grid-template-columns:1fr}
  .op-two-col{grid-template-columns:1fr}
  .rpt-header{flex-direction:column;gap:4px;align-items:flex-start}
  .key-facts{grid-template-columns:1fr 1fr}
}

/* ── PRINT ─────────────────────────────────────── */
@media print{
  :root{--bg:#fff;--surface:#fff;--ink:#000;--ink-muted:#555;--border:#ddd;--grid:#eee;--accent-soft:#f5f5f5}
  body{font-size:11pt}
  .page{max-width:none;padding:0.5in}
  .dossier-card,.card{break-inside:avoid}
  .dossier-card{opacity:1}
  *{animation:none !important;transition:none !important}
}

/* ── FOCUS ─────────────────────────────────────── */
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
</style>
</head>
<body class="{{PALETTE_CLASS}}">
<main class="page">

{{PAGE_HEADER}}

{{CONTENT}}

<div class="rpt-footer">
  <div>{{FOOTER}}</div>
</div>

</main>
</body>
</html>
