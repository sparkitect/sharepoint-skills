<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{REPORT_TITLE}}</title>
<style>
/*
  DESIGN TOKENS
  Palette is applied via a class on <body> (e.g. body.palette-warm-paper).
  Base (:root) holds warm-paper as the default.
  See references/design-system.md for all four palette definitions and heatmap hex values.
*/
:root{
  /* Palette defaults: warm-paper */
  --bg:          #faf7f2;
  --surface:     #ffffff;
  --ink:         #1a1814;
  --ink-muted:   #7a7268;
  --accent:      #c8553d;
  --accent-soft: #f9e6e2;
  --negative:    #b91c1c;
  --border:      #e8e2d8;
  --grid:        #f0ece4;

  /* Shape */
  --radius:    16px;
  --radius-sm: 10px;
  --pad:       28px;
  --gap:       20px;

  /* Type */
  --font-display: ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-body:    ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  --font-mono:    ui-monospace,"SF Mono",Menlo,monospace;

  --fs-h2:    18px;
  --fs-body:  15px;
  --fs-small: 13px;
  --fs-tiny:  11px;
}

/* ── PALETTES ─────────────────────────────────────── */
body.palette-deep-ink{
  --bg:#0f0e0c; --surface:#1a1916; --ink:#f2efe8; --ink-muted:#8a857a;
  --accent:#d4a574; --accent-soft:rgba(212,165,116,0.12);
  --negative:#f87171; --border:#2a2925; --grid:#211f1c;
}
body.palette-clean-white{
  --bg:#ffffff; --surface:#f9fafb; --ink:#0a0a0a; --ink-muted:#6b6b6b;
  --accent:#2d5a3d; --accent-soft:#edf7f1;
  --negative:#dc2626; --border:#e5e7eb; --grid:#f3f4f6;
}
body.palette-slate{
  --bg:#f1f5f9; --surface:#ffffff; --ink:#0f172a; --ink-muted:#64748b;
  --accent:#2563eb; --accent-soft:#eff6ff;
  --negative:#dc2626; --border:#e2e8f0; --grid:#f1f5f9;
}

/* ── RESET & BASE ─────────────────────────────────── */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:var(--fs-body);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv11","tnum";
}
.page{max-width:1240px;margin:0 auto;padding:48px 40px 80px}

/* ── HEADER STRIP ─────────────────────────────────── */
.rpt-header{
  display:flex;align-items:baseline;justify-content:space-between;
  padding-bottom:20px;border-bottom:1px solid var(--border);
}
.rpt-header .company{font-weight:600;font-size:16px;letter-spacing:-0.01em}
.rpt-header .label{font-size:var(--fs-small);color:var(--ink-muted);letter-spacing:0.04em;text-transform:uppercase}

/* ── TITLE BLOCK ──────────────────────────────────── */
.sc-title-block{margin:40px 0 36px}
.sc-title{
  font-family:var(--font-display);
  font-size:clamp(26px,3.8vw,44px);
  font-weight:400;
  line-height:1.15;
  letter-spacing:-0.02em;
  margin:0 0 12px 0;
}
.sc-context{
  font-size:var(--fs-body);
  color:var(--ink-muted);
  line-height:1.55;
  max-width:72ch;
  margin:0;
}

/* ── CARD SHELL ───────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:var(--pad);
  margin-bottom:var(--gap);
}
.card h2{
  font-family:var(--font-display);font-size:var(--fs-h2);
  font-weight:500;letter-spacing:-0.01em;margin:0 0 4px 0;
}
.card .sub{font-size:var(--fs-small);color:var(--ink-muted);margin-bottom:24px}

/* ── MATRIX WRAPPER (horizontal scroll on mobile) ─── */
.sc-matrix-wrap{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin:0 -4px;
  padding:0 4px;
}

/* ── MATRIX TABLE ─────────────────────────────────── */
.sc-matrix{
  width:100%;
  border-collapse:collapse;
  /* min-width ensures columns don't collapse too small on mobile */
  min-width:560px;
}

/* Column header row */
.sc-thead-row th{
  padding:0 10px 14px;
  border-bottom:2px solid var(--border);
  vertical-align:bottom;
  white-space:nowrap;
}

/* Entity label column header (empty) */
.sc-th-entity{
  text-align:left;
  min-width:120px;
  padding-left:0 !important;
}

/* Dimension column headers: two-line, small-caps style */
.sc-th-dim{
  text-align:center;
  min-width:88px;
}
.sc-dim-name{
  display:block;
  font-size:var(--fs-tiny);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--ink-muted);
  line-height:1.3;
  white-space:normal;
  word-break:break-word;
  max-width:90px;
}
.sc-dim-weight{
  display:block;
  font-size:var(--fs-tiny);
  color:var(--accent);
  letter-spacing:0.04em;
  margin-top:3px;
  font-variant-numeric:tabular-nums;
}

/* Weighted Total column header */
.sc-th-total{
  text-align:center;
  min-width:80px;
  border-left:2px solid var(--border);
}

/* Rank column header */
.sc-th-rank{
  text-align:center;
  min-width:56px;
  font-size:var(--fs-tiny);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--ink-muted);
}

/* ── ENTITY ROWS ──────────────────────────────────── */
.sc-entity-row td{
  padding:10px;
  border-bottom:1px solid var(--grid);
  vertical-align:middle;
}
.sc-entity-row:last-of-type td{border-bottom:0}

/* Winner row: subtle accent left border */
.sc-winner{
  box-shadow:inset 3px 0 0 var(--accent);
}
.sc-winner .sc-entity-label{
  background:color-mix(in srgb, var(--accent-soft) 40%, transparent);
}

/* Entity label cell */
.sc-entity-label{
  font-weight:600;
  font-size:var(--fs-body);
  white-space:nowrap;
  padding-left:4px !important;
  border-radius:var(--radius-sm) 0 0 var(--radius-sm);
}

/* Score cells: background set via inline style (heatmap) */
.sc-score-cell{
  text-align:center;
  transition:filter .15s;
}
.sc-score{
  display:block;
  font-size:17px;
  font-weight:500;
  font-variant-numeric:tabular-nums;
  line-height:1.2;
}
.sc-note{
  display:block;
  font-size:var(--fs-tiny);
  color:var(--ink-muted);
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:80px;
  margin-left:auto;
  margin-right:auto;
}

/* Weighted total cell */
.sc-total-cell{
  text-align:center;
  border-left:2px solid var(--border);
  font-variant-numeric:tabular-nums;
}
.sc-total-value{
  font-size:var(--fs-body);
  font-weight:700;
  letter-spacing:-0.01em;
}
.sc-winner .sc-total-cell{
  color:var(--accent);
}

/* Rank cell */
.sc-rank-cell{
  text-align:center;
  white-space:nowrap;
}

/* ── RANK BADGES ──────────────────────────────────── */
.sc-rank-badge{
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-size:var(--fs-tiny);
  font-weight:700;
  letter-spacing:0.04em;
  white-space:nowrap;
}
/* 1st — gold */
.sc-rank-1{background:#fef3c7;color:#92400e}
/* 2nd — silver */
.sc-rank-2{background:#e5e7eb;color:#374151}
/* 3rd — bronze */
.sc-rank-3{background:#fce7d8;color:#7c3a14}
/* 4th+ — plain */
.sc-rank-n{background:var(--grid);color:var(--ink-muted)}

/* ── AVERAGES ROW ─────────────────────────────────── */
.sc-avg-row td{
  padding:10px;
  border-top:2px solid var(--border);
  font-style:italic;
  font-size:var(--fs-small);
  color:var(--ink-muted);
  font-variant-numeric:tabular-nums;
  text-align:center;
  vertical-align:middle;
}
.sc-avg-label{
  text-align:left !important;
  padding-left:4px !important;
  white-space:nowrap;
}
.sc-avg-total,.sc-avg-rank{
  border-left:none;
}

/* Hover: dim non-hovered rows */
.sc-matrix tbody:hover .sc-entity-row:not(:hover) td{opacity:0.55;transition:opacity .12s}
.sc-matrix tbody:hover .sc-avg-row td{opacity:1}

/* ── RANKINGS CALLOUT ─────────────────────────────── */
.sc-rankings.card{margin-top:var(--gap)}
.sc-rank-list{display:grid;gap:16px}
.sc-rank-item{
  display:grid;
  grid-template-columns:52px 1fr;
  align-items:start;
  gap:14px;
  padding:14px 0;
  border-bottom:1px solid var(--grid);
}
.sc-rank-item:last-child{border-bottom:0}
.sc-rank-item .sc-rank-badge{
  margin-top:2px;
  text-align:center;
}
.sc-rank-detail{}
.sc-rank-name{
  font-weight:600;
  font-size:var(--fs-body);
  display:inline;
  margin-right:10px;
}
.sc-rank-score{
  font-size:var(--fs-small);
  color:var(--ink-muted);
  font-variant-numeric:tabular-nums;
  display:inline;
}
.sc-rank-rationale{
  margin:6px 0 0 0;
  font-size:var(--fs-small);
  color:var(--ink);
  line-height:1.55;
}

/* ── DIMENSION WEIGHTS NOTE ───────────────────────── */
.sc-weights-note.card{margin-top:var(--gap)}
.sc-weights-grid{display:grid;gap:0}
.sc-weight-row{
  display:grid;
  grid-template-columns:140px 44px 1fr;
  align-items:baseline;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid var(--grid);
  font-size:var(--fs-small);
}
.sc-weight-row:last-child{border-bottom:0}
.sc-weight-label{font-weight:600}
.sc-weight-pct{
  color:var(--accent);
  font-variant-numeric:tabular-nums;
  text-align:right;
  font-weight:500;
}
.sc-weight-desc{color:var(--ink-muted)}

/* ── FOOTER ───────────────────────────────────────── */
.rpt-footer{
  margin-top:48px;padding-top:20px;border-top:1px solid var(--border);
  font-size:var(--fs-tiny);color:var(--ink-muted);
  display:flex;justify-content:space-between;gap:16px;
}

/* ── MOTION ───────────────────────────────────────── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}

/* ── RESPONSIVE ───────────────────────────────────── */
@media(max-width:820px){
  .page{padding:32px 20px 60px}
  .sc-title-block{margin:28px 0 24px}
  .sc-weight-row{grid-template-columns:120px 40px 1fr;gap:8px}
  .sc-rank-item{grid-template-columns:44px 1fr;gap:10px}
}

/* ── PRINT ────────────────────────────────────────── */
@media print{
  :root{--bg:#fff;--surface:#fff;--ink:#000;--ink-muted:#555;--border:#ddd;--grid:#eee;--accent-soft:#f5f5f5}
  body{font-size:10pt}
  .page{max-width:none;padding:0.5in}
  .card,.sc-matrix-wrap{break-inside:avoid}
  *{animation:none !important;transition:none !important}
  .palette-bar{display:none}
}

/* ── FOCUS ────────────────────────────────────────── */
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px}
</style>
</head>
<body class="{{PALETTE_CLASS}}">
<main class="page">

{{HEADER}}

<div class="card" style="padding:0;overflow:hidden">
  <div style="padding:var(--pad) var(--pad) 0">
    <h2 style="margin-bottom:4px">Score Matrix</h2>
  </div>
  <div style="padding:0 var(--pad) var(--pad)">
    <div class="sc-matrix-wrap">
{{MATRIX}}
    </div>
  </div>
</div>

{{RANKINGS}}

{{WEIGHTS_NOTE}}

<div class="rpt-footer">
  <div>{{FOOTER}}</div>
</div>

</main>
<script>
/*
  INLINE SCRIPT — generated per scorecard.

  For the sample page, this includes the palette switcher.
  For production output, the script block can be empty or omitted —
  the scorecard is fully correct with JavaScript disabled.

  Palette switcher pattern (sample page only):
    function setPalette(name,btn){
      document.body.className='palette-'+name;
      document.querySelectorAll('.pal-btn').forEach(function(b){b.classList.remove('active')});
      btn.classList.add('active');
    }
*/
</script>
</body>
</html>
